<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Courier New', monospace" font-size="11">
  <title>Dual-Sensei Schematic — Phase 1 &amp; Phase 2</title>
  <style>
    .wire { stroke-width: 1.5; fill: none; }
    .wire-i2c { stroke: #2196F3; }
    .wire-enc { stroke: #9C27B0; }
    .wire-btn { stroke: #FF9800; }
    .wire-led { stroke: #4CAF50; }
    .wire-spi { stroke: #F44336; }
    .wire-gnd { stroke: #333; stroke-dasharray: 4,2; }
    .wire-pwr { stroke: #E91E63; }
    .component { fill: #FAFAFA; stroke: #333; stroke-width: 1.5; }
    .component-ph2 { fill: #FFF8E1; stroke: #333; stroke-width: 1.5; stroke-dasharray: 6,3; }
    .pin-label { font-size: 9px; fill: #333; }
    .gpio-label { font-size: 9px; fill: #1565C0; font-weight: bold; }
    .section-label { font-size: 13px; font-weight: bold; fill: #333; }
    .note { font-size: 9px; fill: #666; font-style: italic; }
    .resistor { stroke: #333; stroke-width: 1.5; fill: none; }
    .led-shape { stroke: #333; stroke-width: 1.2; }
    .dot { fill: #333; }
    .title { font-size: 18px; font-weight: bold; fill: #1A237E; font-family: 'Helvetica', sans-serif; }
    .subtitle { font-size: 11px; fill: #666; font-family: 'Helvetica', sans-serif; }
    .phase-label { font-size: 10px; fill: #E65100; font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="1100" height="780" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" class="title">DUAL-SENSEI — One Bridge Unit</text>
  <text x="550" y="46" text-anchor="middle" class="subtitle">PS5 DualSense → PS1 Wireless Controller Bridge  |  ESP32-WROOM-32</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ESP32 DevKit -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="380" y="80" width="200" height="440" rx="6" class="component" fill="#E3F2FD"/>
  <rect x="440" y="70" width="80" height="20" rx="3" fill="#333"/>
  <text x="480" y="84" text-anchor="middle" fill="white" font-size="9">USB</text>
  <text x="480" y="108" text-anchor="middle" class="section-label">ESP32-WROOM-32</text>
  <text x="480" y="122" text-anchor="middle" class="note">DevKit (30/38-pin)</text>

  <!-- Left-side pins -->
  <text x="390" y="158" class="gpio-label">3V3</text>
  <line x1="380" y1="154" x2="360" y2="154" stroke="#E91E63" stroke-width="1.5"/>

  <text x="390" y="178" class="gpio-label">GND</text>
  <line x1="380" y1="174" x2="360" y2="174" stroke="#333" stroke-width="1.5"/>

  <text x="390" y="198" class="gpio-label">G21</text>
  <text x="426" y="198" class="pin-label">SDA</text>
  <line x1="380" y1="194" x2="360" y2="194" stroke="#2196F3" stroke-width="1.5"/>

  <text x="390" y="218" class="gpio-label">G22</text>
  <text x="426" y="218" class="pin-label">SCL</text>
  <line x1="380" y1="214" x2="360" y2="214" stroke="#2196F3" stroke-width="1.5"/>

  <text x="390" y="248" class="gpio-label">G32</text>
  <text x="426" y="248" class="pin-label">TRA</text>
  <line x1="380" y1="244" x2="360" y2="244" stroke="#9C27B0" stroke-width="1.5"/>

  <text x="390" y="268" class="gpio-label">G33</text>
  <text x="426" y="268" class="pin-label">TRB</text>
  <line x1="380" y1="264" x2="360" y2="264" stroke="#9C27B0" stroke-width="1.5"/>

  <text x="390" y="288" class="gpio-label">G25</text>
  <text x="426" y="288" class="pin-label">PHS</text>
  <line x1="380" y1="284" x2="360" y2="284" stroke="#FF9800" stroke-width="1.5"/>

  <text x="390" y="308" class="gpio-label">G26</text>
  <text x="426" y="308" class="pin-label">CON</text>
  <line x1="380" y1="304" x2="360" y2="304" stroke="#FF9800" stroke-width="1.5"/>

  <text x="390" y="328" class="gpio-label">G27</text>
  <text x="426" y="328" class="pin-label">BAK</text>
  <line x1="380" y1="324" x2="360" y2="324" stroke="#FF9800" stroke-width="1.5"/>

  <!-- Right-side pins -->
  <text x="530" y="158" class="gpio-label" text-anchor="end">G2</text>
  <text x="533" y="158" class="pin-label">LED</text>
  <line x1="580" y1="154" x2="600" y2="154" stroke="#4CAF50" stroke-width="1.5"/>

  <text x="530" y="178" class="gpio-label" text-anchor="end">G16</text>
  <text x="533" y="178" class="pin-label">LED1</text>
  <line x1="580" y1="174" x2="600" y2="174" stroke="#4CAF50" stroke-width="1.5"/>

  <text x="530" y="198" class="gpio-label" text-anchor="end">G17</text>
  <text x="533" y="198" class="pin-label">LED2</text>
  <line x1="580" y1="194" x2="600" y2="194" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- PS1 SPI pins (right side, lower) -->
  <text x="530" y="248" class="gpio-label" text-anchor="end">G18</text>
  <text x="533" y="248" class="pin-label">CLK</text>
  <line x1="580" y1="244" x2="600" y2="244" stroke="#F44336" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="530" y="268" class="gpio-label" text-anchor="end">G23</text>
  <text x="533" y="268" class="pin-label">CMD</text>
  <line x1="580" y1="264" x2="600" y2="264" stroke="#F44336" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="530" y="288" class="gpio-label" text-anchor="end">G19</text>
  <text x="533" y="288" class="pin-label">DAT</text>
  <line x1="580" y1="284" x2="600" y2="284" stroke="#F44336" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="530" y="308" class="gpio-label" text-anchor="end">G5</text>
  <text x="536" y="308" class="pin-label">ATT</text>
  <line x1="580" y1="304" x2="600" y2="304" stroke="#F44336" stroke-width="1.5" stroke-dasharray="6,3"/>

  <text x="530" y="328" class="gpio-label" text-anchor="end">G4</text>
  <text x="536" y="328" class="pin-label">ACK</text>
  <line x1="580" y1="324" x2="600" y2="324" stroke="#F44336" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bluetooth antenna symbol -->
  <text x="480" y="480" text-anchor="middle" font-size="28" fill="#1565C0">⦿</text>
  <text x="480" y="505" text-anchor="middle" class="note">BT Classic</text>
  <text x="480" y="515" text-anchor="middle" class="note">(DualSense HID)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Display Board -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="100" width="220" height="300" rx="6" class="component" fill="#F3E5F5"/>
  <text x="160" y="124" text-anchor="middle" class="section-label">Display Board</text>

  <!-- OLED screen representation -->
  <rect x="80" y="134" width="160" height="80" rx="4" fill="#111" stroke="#555"/>
  <text x="160" y="165" text-anchor="middle" fill="#00E676" font-size="12" font-family="monospace">DUAL-SENSEI</text>
  <text x="160" y="182" text-anchor="middle" fill="#00E676" font-size="9" font-family="monospace">v0.1.0</text>
  <text x="160" y="207" text-anchor="middle" fill="#888" font-size="8">SH1106 128×64 OLED</text>

  <!-- Encoder symbol -->
  <circle cx="110" cy="260" r="18" fill="#E0E0E0" stroke="#333" stroke-width="1.5"/>
  <circle cx="110" cy="260" r="5" fill="#999" stroke="#333"/>
  <text x="110" y="290" text-anchor="middle" class="pin-label">EC11 Encoder</text>
  <text x="110" y="300" text-anchor="middle" class="note">(rotate + push)</text>

  <!-- Button symbols -->
  <rect x="170" y="245" width="30" height="18" rx="3" fill="#E0E0E0" stroke="#333" stroke-width="1.2"/>
  <text x="185" y="258" text-anchor="middle" font-size="8" fill="#333">CON</text>

  <rect x="210" y="245" width="30" height="18" rx="3" fill="#E0E0E0" stroke="#333" stroke-width="1.2"/>
  <text x="225" y="258" text-anchor="middle" font-size="8" fill="#333">BAK</text>

  <!-- Header pins -->
  <text x="65" y="340" class="pin-label" font-weight="bold">9-pin Header:</text>
  <g transform="translate(62, 348)">
    <rect x="0" y="0" width="196" height="18" fill="#FFF9C4" stroke="#333" rx="2"/>
    <text x="4" y="13" font-size="8" fill="#333">CON SDA SCL PHS TRA TRB BAK GND VCC</text>
  </g>
  <g transform="translate(62, 368)">
    <text x="0" y="10" font-size="8" fill="#1565C0" font-weight="bold">G26 G21 G22 G25 G32 G33 G27 GND 3V3</text>
  </g>
  <g transform="translate(62, 380)">
    <text x="0" y="10" font-size="8" fill="#666">YEL BLU GRN ORG WHT GRY PUR BLK RED</text>
  </g>

  <!-- Wires: Display Board → ESP32 -->
  <!-- I2C SDA (blue) -->
  <path d="M270,194 L310,194 L310,194 L360,194" class="wire wire-i2c"/>
  <circle cx="270" cy="194" r="2.5" class="dot" fill="#2196F3"/>

  <!-- I2C SCL (blue) -->
  <path d="M270,214 L325,214 L325,214 L360,214" class="wire wire-i2c"/>
  <circle cx="270" cy="214" r="2.5" class="dot" fill="#2196F3"/>

  <!-- Encoder A — TRA (purple) -->
  <path d="M270,244 L360,244" class="wire wire-enc"/>
  <circle cx="270" cy="244" r="2.5" class="dot" fill="#9C27B0"/>

  <!-- Encoder B — TRB (purple) -->
  <path d="M270,264 L360,264" class="wire wire-enc"/>
  <circle cx="270" cy="264" r="2.5" class="dot" fill="#9C27B0"/>

  <!-- Encoder Push — PHS (orange) -->
  <path d="M270,284 L360,284" class="wire wire-enc"/>
  <circle cx="270" cy="284" r="2.5" class="dot" fill="#FF9800"/>

  <!-- Button CON (orange) -->
  <path d="M270,304 L360,304" class="wire wire-btn"/>
  <circle cx="270" cy="304" r="2.5" class="dot" fill="#FF9800"/>

  <!-- Button BAK (orange) -->
  <path d="M270,324 L360,324" class="wire wire-btn"/>
  <circle cx="270" cy="324" r="2.5" class="dot" fill="#FF9800"/>

  <!-- VCC wire -->
  <path d="M270,154 L310,154 L310,150 L360,154" class="wire wire-pwr"/>
  <circle cx="270" cy="154" r="2.5" class="dot" fill="#E91E63"/>
  <text x="310" y="148" text-anchor="middle" class="note">3V3</text>

  <!-- GND wire -->
  <path d="M270,174 L360,174" class="wire wire-gnd"/>
  <circle cx="270" cy="174" r="2.5" class="dot"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Debug LEDs (Phase 1) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="620" y="100" width="200" height="170" rx="6" class="component" fill="#E8F5E9"/>
  <text x="720" y="124" text-anchor="middle" class="section-label">Debug LEDs (Phase 1)</text>

  <!-- LED 0: G2 onboard -->
  <line x1="600" y1="154" x2="640" y2="154" class="wire wire-led"/>
  <!-- Resistor zigzag -->
  <polyline points="640,154 645,148 650,160 655,148 660,160 665,148 670,160 675,154" class="resistor"/>
  <text x="658" y="143" text-anchor="middle" font-size="8" fill="#333">220Ω</text>
  <!-- LED triangle -->
  <polygon points="680,148 680,160 695,154" fill="#4CAF50" stroke="#333" stroke-width="1" class="led-shape"/>
  <line x1="695" y1="148" x2="695" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="695" y1="154" x2="720" y2="154" stroke="#333" stroke-width="1"/>
  <!-- LED arrows (light emission) -->
  <line x1="688" y1="145" x2="693" y2="140" stroke="#4CAF50" stroke-width="0.8"/>
  <line x1="691" y1="147" x2="696" y2="142" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="740" y="158" class="pin-label">G2 (onboard)</text>

  <!-- LED 1: G16 -->
  <line x1="600" y1="174" x2="640" y2="174" class="wire wire-led"/>
  <polyline points="640,174 645,168 650,180 655,168 660,180 665,168 670,180 675,174" class="resistor"/>
  <text x="658" y="163" text-anchor="middle" font-size="8" fill="#333">220Ω</text>
  <polygon points="680,168 680,180 695,174" fill="#FFEB3B" stroke="#333" stroke-width="1" class="led-shape"/>
  <line x1="695" y1="168" x2="695" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="695" y1="174" x2="720" y2="174" stroke="#333" stroke-width="1"/>
  <line x1="688" y1="165" x2="693" y2="160" stroke="#FFEB3B" stroke-width="0.8"/>
  <line x1="691" y1="167" x2="696" y2="162" stroke="#FFEB3B" stroke-width="0.8"/>
  <text x="740" y="178" class="pin-label">G16</text>

  <!-- LED 2: G17 -->
  <line x1="600" y1="194" x2="640" y2="194" class="wire wire-led"/>
  <polyline points="640,194 645,188 650,200 655,188 660,200 665,188 670,200 675,194" class="resistor"/>
  <text x="658" y="183" text-anchor="middle" font-size="8" fill="#333">220Ω</text>
  <polygon points="680,188 680,200 695,194" fill="#F44336" stroke="#333" stroke-width="1" class="led-shape"/>
  <line x1="695" y1="188" x2="695" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="695" y1="194" x2="720" y2="194" stroke="#333" stroke-width="1"/>
  <line x1="688" y1="185" x2="693" y2="180" stroke="#F44336" stroke-width="0.8"/>
  <line x1="691" y1="187" x2="696" y2="182" stroke="#F44336" stroke-width="0.8"/>
  <text x="740" y="198" class="pin-label">G17</text>

  <!-- LED GND bus -->
  <line x1="720" y1="154" x2="720" y2="194" stroke="#333" stroke-width="1"/>
  <line x1="720" y1="220" x2="720" y2="194" stroke="#333" stroke-width="1"/>
  <!-- GND symbol -->
  <line x1="710" y1="220" x2="730" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="714" y1="225" x2="726" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="717" y1="230" x2="723" y2="230" stroke="#333" stroke-width="1"/>
  <text x="720" y="245" text-anchor="middle" class="pin-label">GND</text>

  <text x="720" y="260" text-anchor="middle" class="note">~10mA each @ 3.3V</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- PS1 Controller Port (Phase 2 — dashed) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="680" y="310" width="220" height="260" rx="6" class="component-ph2" fill="#FFF8E1"/>
  <text x="790" y="334" text-anchor="middle" class="section-label">PS1 Controller Port</text>
  <text x="790" y="348" text-anchor="middle" class="phase-label">PHASE 2</text>

  <!-- PS1 connector shape -->
  <rect x="710" y="360" width="160" height="60" rx="8" fill="#E0E0E0" stroke="#333" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="790" y="385" text-anchor="middle" font-size="9" fill="#333">PS1 9-pin Connector</text>
  <text x="790" y="398" text-anchor="middle" font-size="8" fill="#666">(male plug from cut extension cable)</text>

  <!-- Pin labels -->
  <text x="700" y="440" class="pin-label" font-weight="bold">PS1 Pin → [33Ω] → ESP32</text>

  <text x="700" y="458" class="pin-label">Pin 1 (DAT) → [33Ω] → G19 + TVS</text>
  <text x="700" y="470" class="pin-label">Pin 2 (CMD) → [33Ω] → G23</text>
  <text x="700" y="482" class="pin-label">Pin 4 (GND) ──────── GND</text>
  <text x="700" y="494" class="pin-label">Pin 6 (ATT) → [33Ω] → G5</text>
  <text x="700" y="506" class="pin-label">Pin 7 (CLK) → [33Ω] → G18</text>
  <text x="700" y="518" class="pin-label">Pin 9 (ACK) → [33Ω] → G4</text>

  <text x="700" y="538" class="note">Pin 3 (7.6V) — N/C</text>
  <text x="700" y="550" class="note">Pin 5 (3.6V) — N/C (USB powers ESP32)</text>

  <!-- SPI wires (dashed) from ESP32 right side to PS1 box -->
  <line x1="600" y1="244" x2="680" y2="244" stroke="#F44336" stroke-width="1.2" stroke-dasharray="6,3"/>
  <line x1="680" y1="244" x2="680" y2="400" stroke="#F44336" stroke-width="1.2" stroke-dasharray="6,3"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- DualSense Controller (wireless) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="370" y="570" width="220" height="100" rx="12" fill="#F5F5F5" stroke="#333" stroke-width="1.5"/>
  <!-- Controller shape details -->
  <ellipse cx="420" cy="610" rx="20" ry="20" fill="none" stroke="#999" stroke-width="1"/>
  <line x1="416" y1="610" x2="424" y2="610" stroke="#999" stroke-width="1.5"/>
  <line x1="420" y1="606" x2="420" y2="614" stroke="#999" stroke-width="1.5"/>
  <circle cx="540" cy="603" r="4" fill="none" stroke="#999" stroke-width="1"/>
  <circle cx="552" cy="615" r="4" fill="none" stroke="#999" stroke-width="1"/>
  <text x="548" y="607" text-anchor="middle" font-size="7" fill="#999">×</text>
  <text x="540" y="624" text-anchor="middle" font-size="6" fill="#999">○</text>
  <text x="480" y="655" text-anchor="middle" font-size="10" fill="#333">PS5 DualSense</text>

  <!-- BT wireless link -->
  <line x1="480" y1="570" x2="480" y2="525" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="500" y="548" fill="#1565C0" font-size="9" font-weight="bold">BT</text>
  <!-- Wireless waves -->
  <path d="M492,555 Q497,548 492,541" fill="none" stroke="#1565C0" stroke-width="1"/>
  <path d="M497,558 Q504,548 497,538" fill="none" stroke="#1565C0" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Power — USB -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="430" y="55" width="100" height="20" rx="4" fill="#E8EAF6" stroke="#333"/>
  <text x="480" y="69" text-anchor="middle" font-size="9" fill="#333">USB 5V (500mA)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="440" width="260" height="230" rx="6" fill="#FAFAFA" stroke="#CCC"/>
  <text x="65" y="462" class="section-label">Legend</text>

  <line x1="65" y1="480" x2="100" y2="480" stroke="#2196F3" stroke-width="2"/>
  <text x="108" y="484" font-size="10" fill="#333">I2C (SDA/SCL)</text>

  <line x1="65" y1="500" x2="100" y2="500" stroke="#9C27B0" stroke-width="2"/>
  <text x="108" y="504" font-size="10" fill="#333">Encoder (TRA/TRB)</text>

  <line x1="65" y1="520" x2="100" y2="520" stroke="#FF9800" stroke-width="2"/>
  <text x="108" y="524" font-size="10" fill="#333">Buttons (PHS/CON/BAK)</text>

  <line x1="65" y1="540" x2="100" y2="540" stroke="#4CAF50" stroke-width="2"/>
  <text x="108" y="544" font-size="10" fill="#333">Debug LEDs</text>

  <line x1="65" y1="560" x2="100" y2="560" stroke="#F44336" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="108" y="564" font-size="10" fill="#333">PS1 SPI (Phase 2)</text>

  <line x1="65" y1="580" x2="100" y2="580" stroke="#E91E63" stroke-width="2"/>
  <text x="108" y="584" font-size="10" fill="#333">Power (3V3)</text>

  <line x1="65" y1="600" x2="100" y2="600" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="108" y="604" font-size="10" fill="#333">Ground</text>

  <rect x="65" y="618" width="35" height="14" rx="2" fill="none" stroke="#333" stroke-dasharray="6,3"/>
  <text x="108" y="630" font-size="10" fill="#333">Phase 2 (not yet wired)</text>

  <text x="65" y="655" class="note">All button/encoder pins: internal pull-up</text>
  <text x="65" y="665" class="note">Buttons active-low (press = GND)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Architecture note -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="50" y="700" width="1000" height="60" rx="6" fill="#E8EAF6" stroke="#90A4AE"/>
  <text x="550" y="720" text-anchor="middle" font-size="11" fill="#1A237E" font-weight="bold">Dual-Player Architecture: Two independent, identical units — zero inter-board communication</text>
  <text x="550" y="740" text-anchor="middle" font-size="10" fill="#333">[DualSense #1] ──BT──▶ [ESP32 + OLED A] ──SPI──▶ [PS1 Port 1]          [DualSense #2] ──BT──▶ [ESP32 + OLED B] ──SPI──▶ [PS1 Port 2]</text>
</svg>
