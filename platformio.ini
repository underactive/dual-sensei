; Dual-Sensei: PS5-to-PS1 Wireless Controller Bridge
; PlatformIO configuration for ESP32 with ESP-IDF + Arduino as component

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf, arduino

; Libraries
lib_deps =
    olikraus/U8g2

; Custom partition table (larger app partition for BT stack)
board_build.partitions = partitions.csv

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Upload speed
upload_speed = 921600
