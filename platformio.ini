; Dual-Sensei: PS5-to-PS1 Wireless Controller Bridge
; ESP32 with ESP-IDF framework + Arduino as component + Bluepad32 for DualSense BT

[platformio]
src_dir = main

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32dev
framework = espidf

; Libraries
lib_deps =
    olikraus/U8g2

; Force library compatibility — U8g2 is an Arduino library but works
; fine as an ESP-IDF component since Arduino is included as a component.
lib_compat_mode = off

; Custom partition table (larger app partition for BT + Bluepad32 stack)
board_build.partitions = partitions.csv

; Embedded certificates required by Arduino component's transitive deps
; (esp_insights, esp_rainmaker). We don't use these but they must exist for linking.
board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

; Serial monitor
monitor_speed = 115200

; Patches for pioarduino platform warnings (ESP-IDF v5.4 compat)
extra_scripts = post:pio_patches.py

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3


; Upload speed (460800 is safest for most USB-serial chips; lower to 115200 if still failing)
upload_speed = 460800
