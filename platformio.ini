; Dual-Sensei: PS5-to-PS1 Wireless Controller Bridge
; ESP32 with Arduino framework (built on ESP-IDF — all IDF APIs still accessible)

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

; Libraries
lib_deps =
    olikraus/U8g2

; Custom partition table (larger app partition for BT stack)
board_build.partitions = partitions.csv

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Upload speed (460800 is safest for most USB-serial chips; lower to 115200 if still failing)
upload_speed = 460800
